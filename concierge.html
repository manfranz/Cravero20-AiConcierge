// ---- UI INIT ----
const ui = UI[lang] || UI['en'];
document.getElementById('langFlag').textContent = FLAGS[lang] || 'рҹҢҚ';
document.getElementById('roomLabel').textContent = ROOM_LABEL[room] || 'Green Room';
document.getElementById('backBtn').href = BACK_URL[room] || 'landing-green.html';
document.getElementById('welcomeGreeting').textContent = ui.greeting;
document.getElementById('welcomeText').textContent = ui.welcome;
document.getElementById('textInput').placeholder = ui.placeholder;
document.title = `Cravero20 вҖ” ${ROOM_LABEL[room]} Concierge`;

const qqEl = document.getElementById('quickQuestions');
ui.quick.forEach((label, i) => {
  const btn = document.createElement('button');
  btn.className = 'quick-btn';
  btn.textContent = label;
  btn.onclick = () => sendQuick(ui.quickMsg[i]);
  qqEl.appendChild(btn);
});

// ---- CHAT ----
const messagesEl = document.getElementById('messages');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
let conversationHistory = [];
let isLoading = false;

const SYSTEM_PROMPT = `You are the AI concierge of Cravero20, a B&B in Garbatella, Rome. You MUST respond ONLY in ${LANG_NAMES[lang] || 'English'} (language code: ${lang}). Be warm, helpful and concise. Never invent information. If unsure, suggest contacting Francesco on WhatsApp at +39 327 039 3627.\n\nThe guest is staying in the ${room === 'green' ? 'Green Room' : 'Gray Room'}.\n\n${KNOWLEDGE_BASE(room)}`;

function addMessage(role, text) {
  const qq = document.getElementById('quickQuestions');
  if (role === 'user' && qq) qq.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? 'C20' : (FLAGS[lang] || 'You');

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = 'C20';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTypingIndicator() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  textInput.value = '';
  textInput.style.height = 'auto';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });
  addTypingIndicator();

  try {
    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: conversationHistory,
        generationConfig: { temperature: 0.7, maxOutputTokens: 600 }
      })
    });

    const data = await response.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text
      || 'Sorry, I could not process your request. Please contact Francesco on WhatsApp: +39 327 039 3627';

    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    removeTypingIndicator();
    addMessage('ai', reply);
    speakText(reply);

  } catch (err) {
    removeTypingIndicator();
    addMessage('ai', 'Connection error. Please try again or contact Francesco: +39 327 039 3627');
  }

  isLoading = false;
  sendBtn.disabled = false;
}

function sendQuick(text) {
  textInput.value = text;
  sendMessage();
}

// ---- TTS ----
const ttsBar = document.getElementById('ttsBar');
const stopTtsBtn = document.getElementById('stopTtsBtn');

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = TTS_LANG[lang] || 'en-US';
  utterance.rate = 0.95;
  utterance.pitch = 1;
  utterance.onstart = () => ttsBar.classList.add('active');
  utterance.onend = () => ttsBar.classList.remove('active');
  utterance.onerror = () => ttsBar.classList.remove('active');
  window.speechSynthesis.speak(utterance);
}

stopTtsBtn.addEventListener('click', () => {
  window.speechSynthesis.cancel();
  ttsBar.classList.remove('active');
});

// ---- VOICE INPUT ----
let recognition = null;
let isRecording = false;
const micBtn = document.getElementById('micBtn');

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input not supported on this browser. Please use Chrome.');
    return;
  }

  if (isRecording) { recognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = TTS_LANG[lang] || 'en-US';

  recognition.onstart = () => { isRecording = true; micBtn.classList.add('recording'); };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    textInput.value = t;
    textInput.style.height = 'auto';
    textInput.style.height = textInput.scrollHeight + 'px';
    sendMessage();
  };
  recognition.onerror = () => { isRecording = false; micBtn.classList.remove('recording'); };
  recognition.onend = () => { isRecording = false; micBtn.classList.remove('recording'); };
  recognition.start();
}
</script>
