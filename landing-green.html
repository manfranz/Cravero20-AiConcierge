<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cravero20 — Green Room Concierge</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #FFF9E6 0%, #E8F6FB 50%, #D4EFF8 100%);
    color: #1C3040;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(253, 250, 243, 0.88);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(28, 48, 64, 0.12), 0 2px 8px rgba(91, 184, 212, 0.15);
    max-width: 420px;
    width: 100%;
    padding: 36px 28px 40px;
    text-align: center;
  }

  header {
    margin-bottom: 28px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #1C3040;
    letter-spacing: 0.04em;
  }

  .logo span {
    color: #5BB8D4;
  }

  .room-badge {
    display: inline-block;
    margin-top: 8px;
    background: linear-gradient(135deg, #5BB8D4, #3da0bc);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
  }

  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
  }

  .ornament-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, #F5C842);
    max-width: 60px;
  }

  .ornament-line.right {
    background: linear-gradient(90deg, #F5C842, transparent);
  }

  .ornament-diamond {
    width: 7px;
    height: 7px;
    background: #F5C842;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .welcome-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-style: italic;
    color: #1C3040;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .welcome-sub {
    font-size: 0.82rem;
    color: #5a7a8a;
    letter-spacing: 0.06em;
    margin-bottom: 28px;
    font-weight: 400;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .lang-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 18px 12px;
    background: white;
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    color: #1C3040;
    box-shadow: 0 2px 12px rgba(28,48,64,0.08);
    transition: all 0.22s ease;
    opacity: 0;
    transform: translateY(20px);
    font-family: 'Nunito', sans-serif;
  }

  .lang-btn:hover {
    border-color: #5BB8D4;
    background: linear-gradient(135deg, #FDFAF3, #EEF8FC);
    box-shadow: 0 6px 20px rgba(91,184,212,0.22);
    transform: translateY(-2px) !important;
  }

  .lang-btn:active {
    transform: scale(0.97) !important;
  }

  .flag {
    font-size: 2rem;
    line-height: 1;
  }

  .lang-name {
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .lang-native {
    font-size: 0.72rem;
    color: #7a9aaa;
    font-weight: 400;
  }

  .footer-note {
    margin-top: 24px;
    font-size: 0.7rem;
    color: #9ab0bb;
    letter-spacing: 0.08em;
  }

  .lang-btn.visible {
    animation: fadeSlideUp 0.45s ease forwards;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="card">
  <header>
    <div class="logo">Cravero<span>20</span></div>
    <div class="room-badge">Green Room Concierge</div>
  </header>

  <div class="ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line right"></div>
  </div>

  <h1 class="welcome-title">Benvenuto<br>Welcome</h1>
  <p class="welcome-sub">Scegli la tua lingua · Choose your language</p>

  <div class="lang-grid">
    <a class="lang-btn" href="concierge.html?room=green&lang=it">
      <span class="flag">🇮🇹</span>
      <span class="lang-name">Italiano</span>
    </a>
    <a class="lang-btn" href="concierge.html?room=green&lang=en">
      <span class="flag">🇬🇧</span>
      <span class="lang-name">English</span>
    </a>
    <a class="lang-btn" href="concierge.html?room=green&lang=fr">
      <span class="flag">🇫🇷</span>
      <span class="lang-name">Français</span>
    </a>
    <a class="lang-btn" href="concierge.html?room=green&lang=es">
      <span class="flag">🇪🇸</span>
      <span class="lang-name">Español</span>
    </a>
    <a class="lang-btn" href="concierge.html?room=green&lang=zh">
      <span class="flag">🇨🇳</span>
      <span class="lang-name">中文</span>
    </a>
    <a class="lang-btn" href="concierge.html?room=green&lang=ko">
      <span class="flag">🇰🇷</span>
      <span class="lang-name">한국어</span>
    </a>
  </div>

  <p class="footer-note">Garbatella, Rome · Via Enrico Cravero 20</p>
</div>

<script>
  const btns = document.querySelectorAll('.lang-btn');
  btns.forEach((btn, i) => {
    setTimeout(() => btn.classList.add('visible'), 120 + i * 90);
  });
</script>
</body>
</html>
