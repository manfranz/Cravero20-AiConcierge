<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casa Romana — Concierge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap');

  :root {
    --gold: #c9a96e;
    --gold-light: #e8d5a3;
    --dark: #0e0c0a;
    --dark2: #1a1612;
    --dark3: #252018;
    --cream: #f5f0e8;
    --text-dim: #8a7d6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 40px 24px 28px;
    border-bottom: 1px solid rgba(201,169,110,0.2);
  }

  .logo-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .ornament-line {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }
  .ornament-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .ornament-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 0.12em;
  }

  header h1 span { color: var(--gold); }

  header p {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .chat-container {
    flex: 1;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
    padding: 0 16px;
  }

  #messages {
    flex: 1;
    padding: 28px 0 12px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 280px;
    max-height: 52vh;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--dark3) transparent;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--dark3); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--dark3), var(--dark2));
    border: 1px solid rgba(201,169,110,0.4);
    color: var(--gold);
  }

  .avatar.user {
    background: linear-gradient(135deg, var(--gold), #a07840);
    color: var(--dark);
  }

  .bubble {
    max-width: calc(100% - 56px);
    padding: 13px 17px;
    border-radius: 2px;
    line-height: 1.65;
    font-size: 0.88rem;
    white-space: pre-wrap;
  }

  .message.ai .bubble {
    background: var(--dark2);
    border: 1px solid rgba(201,169,110,0.12);
    border-left: 2px solid rgba(201,169,110,0.4);
  }

  .message.user .bubble {
    background: rgba(201,169,110,0.1);
    border: 1px solid rgba(201,169,110,0.25);
    text-align: right;
  }

  .welcome-card {
    background: var(--dark2);
    border: 1px solid rgba(201,169,110,0.15);
    padding: 24px;
    margin: 8px 0;
    text-align: center;
    position: relative;
  }

  .welcome-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    width: 40px; height: 2px;
    background: var(--gold);
  }

  .welcome-card .greeting {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--gold-light);
    margin-bottom: 8px;
  }

  .welcome-card p {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.7;
  }

  .quick-questions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    padding: 6px 0 14px;
  }

  .quick-btn {
    background: transparent;
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--text-dim);
    padding: 7px 13px;
    font-family: 'Jost', sans-serif;
    font-size: 0.73rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
  }

  .quick-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,169,110,0.05);
  }

  .input-area {
    position: relative;
    z-index: 1;
    border-top: 1px solid rgba(201,169,110,0.15);
    background: var(--dark);
    padding: 14px 16px;
    max-width: 680px;
    width: 100%;
    margin: 0 auto;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  #textInput {
    flex: 1;
    background: var(--dark2);
    border: 1px solid rgba(201,169,110,0.2);
    border-radius: 1px;
    color: var(--cream);
    padding: 12px 16px;
    font-family: 'Jost', sans-serif;
    font-size: 0.88rem;
    font-weight: 300;
    resize: none;
    min-height: 48px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }

  #textInput:focus { border-color: rgba(201,169,110,0.5); }
  #textInput::placeholder { color: var(--text-dim); }

  .btn-send, .btn-mic {
    width: 48px; height: 48px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    border-radius: 1px;
  }

  .btn-send { background: var(--gold); color: var(--dark); }
  .btn-send:hover { background: var(--gold-light); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-mic {
    background: var(--dark2);
    border: 1px solid rgba(201,169,110,0.25);
    color: var(--text-dim);
  }

  .btn-mic:hover { border-color: var(--gold); color: var(--gold); }

  .btn-mic.recording {
    background: rgba(201,169,110,0.15);
    border-color: var(--gold);
    color: var(--gold);
    animation: pulse 1.2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,110,0.4); }
    50% { box-shadow: 0 0 0 8px rgba(201,169,110,0); }
  }

  .typing-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 4px 0;
  }

  .typing-dots span {
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    animation: dot 1.2s infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .status-bar {
    text-align: center;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 0 0;
  }

  .status-dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <div class="logo-ornament">
    <div class="ornament-line"></div>
    <div class="ornament-diamond"></div>
    <div class="ornament-line right"></div>
  </div>
  <h1>Casa <span>Romana</span></h1>
  <p>Garbatella, Rome · Your personal concierge</p>
</header>

<div class="chat-container">
  <div id="messages">
    <div class="welcome-card">
      <div class="greeting">Benvenuto — Welcome!</div>
      <p>I'm your personal concierge for Casa Romana. Ask me anything about the house, WiFi, hot water, restaurants, transport, or Francesco's extra services. I speak your language 🌍</p>
    </div>
    <div class="quick-questions">
      <button class="quick-btn" onclick="sendQuick('What is the WiFi password?')">📶 WiFi</button>
      <button class="quick-btn" onclick="sendQuick('What time is check-out?')">🕙 Check-out</button>
      <button class="quick-btn" onclick="sendQuick('How does the hot water work?')">🚿 Hot water</button>
      <button class="quick-btn" onclick="sendQuick('Best restaurants nearby?')">🍝 Restaurants</button>
      <button class="quick-btn" onclick="sendQuick('How do I get to the Colosseum?')">🏛️ Getting around</button>
      <button class="quick-btn" onclick="sendQuick('What extra services does Francesco offer?')">✨ Extras</button>
      <button class="quick-btn" onclick="sendQuick('What are the house rules?')">📋 House rules</button>
      <button class="quick-btn" onclick="sendQuick('The electricity went out, what do I do?')">⚡ Emergency</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="textInput" placeholder="Ask me anything about your stay…" rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
    <button class="btn-mic" id="micBtn" onclick="toggleMic()" title="Voice input">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="status-bar">
    <span class="status-dot"></span>Casa Romana Concierge · Garbatella, Rome
  </div>
</div>

<script>
const GEMINI_API_KEY = 'AIzaSyD8_cxtBOPYUrcadUI3E2IMYz6OCI-Zjlk';

const KNOWLEDGE_BASE = `
You are the friendly AI concierge of Casa Romana, a charming B&B in the Garbatella neighbourhood of Rome, run by Francesco.
Always respond in the same language the guest uses. Be warm, helpful and concise. Use a friendly but refined tone.
Never invent information. If you don't know something, suggest contacting Francesco on WhatsApp at +39 327 039 3627.

=== THE HOST ===
Francesco is a freelance professional with a passion for cooking and hospitality.
WhatsApp / phone: +39 327 039 3627

=== ADDRESS ===
Via Enrico Cravero n. 20, Scala P — Ring bell: Mangiaracina
Neighbourhood: Garbatella, Rome — a historic, charming and authentic district.
The apartment is inside one of Garbatella's famous "lotti" — micro-villages with gardens and shared courtyards.

=== CHECK-IN / CHECK-OUT ===
Check-out time: 10:00 AM (maximum).
Please let Francesco know your estimated departure time to help him plan cleaning.
Keys: return them to the keybox, or leave them on the bed/table.
Luggage storage after checkout: not possible in common areas for security reasons.
Nearest luggage storage: near Stazione Termini (Francesco can share the link on request).

=== WIFI ===
Network: Iliadbox
Password: m5zbrqh9wvqmxw7nqccms2
Speed: fast fiber connection.

=== KEYS ===
The key with the grey handle opens the security grilles.
If you lose your keys, message Francesco immediately.

=== HOT WATER ===
Supplied by a 100-litre heat pump water heater (no boiler — the building layout didn't allow it).
Normal heating time: 2–3 hours for a full tank.
Before showering: press the "Set" button once on the water heater to check the temperature.
Faster heating: press the ">>" button to activate boost mode (1.5–2.5 hours).
If other guests have recently showered, you may need to wait for the tank to reheat.
Recommended shower times:
- Green Room guests: preferably in the morning.
- Grey Room guests: preferably late afternoon or evening.
Please avoid wasting hot water — it's a shared resource for both rooms.

=== ROOM DOOR ===
For security, always close your room door when going out.

=== KITCHEN ===
Cutlery: in the drawer next to the fridge, upper compartment (slightly hidden). Pots and utensils below.
Stove: induction — only activates when a pot or pan is placed on it.
Water: there is a water filtration system — no need to buy bottled water.
Storage: use any free space in cupboards and fridge not occupied by other guests.

=== BATHROOM ===
The bathroom has a hand-held shower hose instead of a traditional bidet. The bathroom mirror is illuminated with adjustable colour and intensity.
Note: the bathroom is quite compact.

=== HEATING ===
Central building heating: active between 4 PM and 10 PM in winter season. Radiator is near the entrance door.
If the radiator is cold during heating hours, turn the knob in the opposite direction (set between 2 and 5).
Grey Room bathroom: electric warm-air heater with white remote control inside the bathroom.
Green Room bathroom: standard radiator.

=== LAUNDRY ===
Washing machine available — please be respectful of other guests.

=== SMOKING ===
Strictly no smoking inside. There is a smoke detection system and the alarm is extremely loud.
Balcony: smoking is allowed.

=== TOILET PAPER ===
Visible in the bathroom or in the bathroom cabinet.

=== LINEN & TOWELS ===
Included as stated on the Airbnb listing.

=== ELECTRICITY / POWER OUTAGE ===
If the electricity goes out: find the electrical panel just inside the entrance on the left (there's a door).
The "General" switch is probably down — pull it up.
After restoring power: restart the water heater by pressing the power button (circular, with a dash), then press "Set" without changing any settings until nothing is flashing.

=== PARKING ===
Parking becomes difficult from the afternoon onwards due to nearby restaurants and bars.
Better chances on: Via Cialdi or Via Giovannipoli.

=== PUBLIC TRANSPORT ===
Metro Garbatella: 7 minutes walk.
Roma Ostiense station: 1.5 km.
Distances by metro:
- Colosseum: 3 stops
- St Peter's / Vatican: 6 stops
Universities nearby: UNINT (15 min walk), Roma Tre (16 min walk).
Transport tickets: www.atac.roma.it/biglietti-e-abbonamenti

=== SAFETY ===
The area is safe. Garbatella is a quiet neighbourhood with a Carabinieri station right next to the house.
Warning: on the Metro, watch out for pickpockets, often working in pairs — one distracts by asking for information while the other reaches for your pockets.

=== EXTRA SERVICES (PAID — book via WhatsApp) ===
🚲 Bike rental: two bicycles available.
🍝 Homemade pasta class: Francesco teaches you to make pasta and sauce from scratch. You eat the result! Dishes available: Amatriciana, Carbonara, Meat ragù, Cacio e pepe.
🛵 Scooter tour: panoramic tour of Rome's historic centre by scooter.

=== DISCOUNT FOR RETURNING GUESTS ===
If you leave a 4-star review on Airbnb: 10% discount on direct booking next time.
If you leave a 5-star review: 15% discount. Plus savings from no platform fees = up to 30–35% total.
Valid 12 months and extendable to friends. Book directly via WhatsApp: +39 327 039 3627.

=== RESTAURANTS & BARS NEARBY (Francesco's personal guide) ===

🏃 Very close & super authentic:
- Panonto (30 sec walk, right around the corner): one of the most popular pizzerias in all of Rome. Cannot be booked — just show up.
- Tozzo Strit Fud (1 min walk, behind the house): Roman street food. Pro tip: say "mi manda Francesco il Toscano" for 10% off!
- Bar Foschi (1 min walk): artisan pastry bar, perfect for breakfast and aperitivo.
- Ristorante Georgiano (1 min walk): authentic Georgian cuisine, great for something different.

🍝 Classic Roman trattorie:
- Tanto pè magnà (9 min, 650m): the most Roman place imaginable. Exceptional carbonara.
- Er Grottino del Traslocatore (3 min, 220m): local institution, great amatriciana (occasionally inconsistent but Francesco likes it).
- Dar Moschino (5 min, 350m): historic, very authentic trattoria.
- Il Girasole (15 min, 1.1km): considered a neighbourhood reference for amatriciana and carbonara.
- O Masto 3 Al Vesuvio (5 min, 350m): excellent Neapolitan pizza and fried starters.
- I Tre Fratelli (8 min, 600m): not classic Roman but reliable and international-friendly (good risotto di pesce).
- Osteria Pizzeria Giovanni (17 min, 1.3km): a quirky experience — an elderly lady cooks whatever she feels like. Very cheap, very authentic, a bit unpredictable. Fried starters are usually safe.

🥂 For a special evening:
- Ristoro degli Angeli (right behind the house): elegant but not too formal, perfect for a romantic dinner.
- Anna e Bicchieri (3 min): refined cuisine and wine bar.

☕ Bars & wine:
- La Mescita (2 min, next to Bar Foschi): fantastic wine bar for aperitivo, great taglieri.
- Bar dei Cesaroni (8 min, 600m): historic bar made famous by the Italian TV series "I Cesaroni". Good for aperitivo.
- Otium (8 min, via De Nobili): reportedly worth a visit (Francesco hasn't tried it personally).

🍦 Gelato:
- Gelato Baciato (2 min, 300m): exceptional gelato. Look for the queue!

💡 TIP: Always book ahead, especially on weekends. These places fill up fast. Exception: Panonto doesn't take reservations.

=== MINI GUIDE TO ROMAN CUISINE ===
Pasta dishes:
- Carbonara: eggs, guanciale, pecorino romano, black pepper. NEVER with cream!
- Amatriciana: tomato, guanciale, pecorino. Traditionally with bucatini (messy to eat!).
- Cacio e Pepe: just pecorino and black pepper — simple but very hard to make well.
- Gricia: the "white carbonara" — guanciale, pecorino, pepper.

Main courses:
- Saltimbocca alla Romana: veal with prosciutto and sage.
- Abbacchio alla Romana: roast lamb with herbs.
- Carciofi alla Giudia: Jewish-style fried artichoke (best at the Jewish Ghetto).

Sides & street food:
- Puntarelle: chicory shoots with anchovy dressing (winter dish).
- Supplì: fried rice balls with mozzarella.
- Baccalà fritto: fried salt cod.
`;

// ============================================================
// CHAT LOGIC
// ============================================================
const messagesEl = document.getElementById('messages');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
let conversationHistory = [];
let isLoading = false;

function addMessage(role, text) {
  const qq = document.querySelector('.quick-questions');
  if (role === 'user' && qq) qq.style.display = 'none';

  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'ai' ? 'CR' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'message ai';
  div.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = 'CR';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTypingIndicator() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = textInput.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  textInput.value = '';
  textInput.style.height = 'auto';

  addMessage('user', text);
  conversationHistory.push({ role: 'user', parts: [{ text }] });
  addTypingIndicator();

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: KNOWLEDGE_BASE }] },
          contents: conversationHistory,
          generationConfig: { temperature: 0.7, maxOutputTokens: 600 }
        })
      }
    );

    const data = await response.json();
    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text
      || 'Sorry, I could not process your request. Please contact Francesco on WhatsApp: +39 327 039 3627';

    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    removeTypingIndicator();
    addMessage('ai', reply);

    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(reply);
      utterance.rate = 0.95;
      utterance.pitch = 1;
      window.speechSynthesis.speak(utterance);
    }

  } catch (err) {
    removeTypingIndicator();
    addMessage('ai', 'Connection error. Please try again or contact Francesco: +39 327 039 3627');
  }

  isLoading = false;
  sendBtn.disabled = false;
}

function sendQuick(text) {
  textInput.value = text;
  sendMessage();
}

// ============================================================
// VOICE INPUT
// ============================================================
let recognition = null;
let isRecording = false;
const micBtn = document.getElementById('micBtn');

function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice input not supported on this browser. Please use Chrome.');
    return;
  }

  if (isRecording) { recognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = navigator.language || 'en-US';

  recognition.onstart = () => { isRecording = true; micBtn.classList.add('recording'); };

  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    textInput.value = t;
    textInput.style.height = 'auto';
    textInput.style.height = textInput.scrollHeight + 'px';
    sendMessage();
  };

  recognition.onerror = () => { isRecording = false; micBtn.classList.remove('recording'); };
  recognition.onend = () => { isRecording = false; micBtn.classList.remove('recording'); };
  recognition.start();
}
</script>
</body>
</html>
